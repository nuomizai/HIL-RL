task_name: pushtest


abs_pose_limit_high: 
    left: [0.50, 0.40, 0.55, 0, 0, 0]
    right: [0.50, -0.20, 0.55, 0, 0, 0]
abs_pose_limit_low: 
    left: [0.35, 0.20, 0.1, 0.0, 0.0, 0.0]
    right: [0.35, -0.40, 0.1, 0.0, 0.0, 0.0]

reset_joint: 
    left: [0.0, 0.1, -0.15, -1.77, 0.0, 0.0, 0.0]
    right: [0.0, -0.1, 0.15, -1.77, 0.0, 0.0, 0.0]


"dataset": {
    "repo_id": silri,
    "use_imagenet_stats": false,
    "root": "../../../offline_dataset/pushtest_tienkung_0113"
}

gripper_penalty: -0.4

classifier_cfg:
    classifier_keys: ["top","left","right"]
    pretrained_encoder_path: ../resnet10_params.pkl
    checkpoint_path: classifier/checkpoints/000500
    dataset_path: offline_dataset/pushtest_tienkung_0113
    reward_pos: 10.0
    reward_neg: -0.05
    require_train: true 
    task_name: ${task_name}
    algorithm: hil-serl
    target_hz: 10
    batch_size: 128
    enable_stacking: false
    load_classifier: ${load_classifier}

close_gripper: false
fix_gripper: false
max_episode_length: 200
max_train_time: 9000

resume_model: false
resume_path: None